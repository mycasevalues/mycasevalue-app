<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7F8FA;stop-opacity:1" />
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="rgba(9,102,195,0.05)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="rgba(9,102,195,0.05)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0966C3;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#0966C3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0966C3;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)"/>

  <!-- Top brand bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#0966C3"/>

  <!-- Logo lockup -->
  <g transform="translate(600, 150)">
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#0966C3" text-anchor="middle" letter-spacing="-0.5">MyCaseValue</text>
  </g>

  <!-- Main headline -->
  <text x="600" y="270" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="700" fill="#0f0f0f" text-anchor="middle" letter-spacing="-1.5">Federal Court Outcome Data</text>

  <!-- Subheadline -->
  <text x="600" y="335" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#4B5563" text-anchor="middle" letter-spacing="-0.3">Win rates, settlement ranges, and judge analytics</text>
  <text x="600" y="370" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#4B5563" text-anchor="middle" letter-spacing="-0.3">from public federal court records</text>

  <!-- Stats row -->
  <g transform="translate(600, 470)">
    <!-- Stat 1: 5.1M+ Cases -->
    <text x="-280" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#0966C3" text-anchor="middle">5.1M+</text>
    <text x="-280" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#4B5563" text-anchor="middle" letter-spacing="0.5">FEDERAL CASES</text>

    <!-- Stat 2: 95 Districts -->
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#0966C3" text-anchor="middle">95</text>
    <text x="0" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#4B5563" text-anchor="middle" letter-spacing="0.5">FEDERAL DISTRICTS</text>

    <!-- Stat 3: 84 Case Types -->
    <text x="280" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#0966C3" text-anchor="middle">84</text>
    <text x="280" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#4B5563" text-anchor="middle" letter-spacing="0.5">CASE TYPES</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="350" y="565" width="500" height="3" fill="url(#accentGradient)" rx="2"/>

  <!-- Bottom URL -->
  <text x="600" y="600" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.3">mycasevalues.com</text>
</svg>
