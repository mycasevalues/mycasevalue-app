<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#131B2E;stop-opacity:1" />
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" stroke="rgba(64,64,242,0.03)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="40" stroke="rgba(64,64,242,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <rect width="1200" height="630" fill="url(#gridPattern)"/>

  <!-- Logo group -->
  <g transform="translate(600, 180)">
    <!-- Dot -->
    <circle cx="-14" cy="0" r="4.5" fill="#4040F2"/>
    <!-- Slash -->
    <line x1="8" y1="-8" x2="0" y2="8" stroke="#4040F2" stroke-width="3" stroke-linecap="round"/>
    <!-- Text: MyCaseValue -->
    <text x="18" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff" letter-spacing="-0.5">MyCaseValue</text>
  </g>

  <!-- Main headline -->
  <text x="600" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1" line-height="1.2">Federal Court Outcome Data</text>

  <!-- Stats line -->
  <g transform="translate(600, 380)">
    <!-- First stat: 4.2M+ Cases -->
    <text x="-180" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#4040F2">4.2M+</text>
    <text x="-120" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#a0a9d4">Cases</text>

    <!-- Separator -->
    <text x="-25" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#4040F2">•</text>

    <!-- Second stat: 50+ Years -->
    <text x="20" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#4040F2">50+</text>
    <text x="80" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#a0a9d4">Years</text>

    <!-- Separator -->
    <text x="160" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#4040F2">•</text>

    <!-- Third stat: 94 Districts -->
    <text x="205" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#4040F2">94</text>
    <text x="255" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#a0a9d4">Districts</text>
  </g>

  <!-- Accent line -->
  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4040F2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4040F2;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect x="550" y="420" width="100" height="3" fill="url(#accentGradient)" rx="2"/>
</svg>
