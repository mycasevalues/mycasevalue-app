name: Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'
  push:
    branches: [main]

jobs:
  audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
